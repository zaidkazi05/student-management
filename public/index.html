<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Management</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="page">
      <section class="intro" aria-labelledby="page-title">
        <p class="eyebrow">Student Management</p>
        <h1 id="page-title">Contact Us</h1>
        <p class="lead">Send your details and we will get back to you about student support, admissions, or records.</p>
      </section>

      <section class="panel" aria-label="Contact form">
        <form id="contactForm">
          <label>
            Name
            <input name="name" type="text" autocomplete="name" maxlength="100" required>
          </label>

          <label>
            Email
            <input name="email" type="email" autocomplete="email" maxlength="120" required>
          </label>

          <label>
            Phone
            <input name="phone" type="tel" autocomplete="tel" maxlength="30">
          </label>

          <label>
            Message
            <textarea name="message" rows="5" maxlength="1000" required></textarea>
          </label>

          <button type="submit">Submit</button>
          <p id="formStatus" class="status" role="status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="/script.js"></script>
  </body>
</html>
